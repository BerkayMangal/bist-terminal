[pytest]
# ================================================================
# BISTBULL TERMINAL — Test Configuration
# ================================================================

# Project root is on the Python path so `from engine.scoring import ...` works
pythonpath = .

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Custom markers
markers =
    unit: Pure logic unit tests — no I/O, no network, no Redis
