<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST Terminal v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#030306;--bg1:#0a0a10;--bg2:#0d0d14;--bgH:#14141e;
  --brd:#1a1a2e;--brdA:#2a2a4e;
  --t1:#e0e0e8;--t2:#6a6a80;--t3:#3a3a50;
  --grn:#00e68a;--grnD:#00e68a33;--red:#ff3b5c;--redD:#ff3b5c33;
  --amb:#ffb800;--ambD:#ffb80033;--blu:#3b9fff;--bluD:#3b9fff33;
  --pur:#a78bfa;--purD:#a78bfa33;
  --mono:'IBM Plex Mono',monospace;--disp:'Space Grotesk',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--t1);font:13px var(--mono);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}

#app{display:flex;flex-direction:column;height:100vh}

/* ── MARKET BAR ── */
.mbar{display:flex;align-items:center;gap:2px;padding:0 12px;height:34px;background:var(--bg1);border-bottom:1px solid var(--brd);overflow-x:auto;flex-shrink:0}
.mbar .mi{display:flex;align-items:center;gap:7px;padding:0 10px;height:100%;white-space:nowrap;font-size:11px;border-right:1px solid var(--brd)}
.mbar .ml{color:var(--t3);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.mbar .mp{color:var(--t1);font-weight:600}
.mbar .mc{font-size:10px;font-weight:500}
.mbar .mc.up{color:var(--grn)}.mbar .mc.dn{color:var(--red)}
.mbar .mt{margin-left:auto;color:var(--t3);font-size:10px;display:flex;align-items:center;gap:6px}
.mbar .mt button{background:none;border:none;color:var(--t3);cursor:pointer;font:10px var(--mono)}
.mbar .mt button:hover{color:var(--amb)}

/* ── NAV ── */
.nav{display:flex;align-items:center;padding:0 12px;height:40px;background:var(--bg1);border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto}
.nav .logo{font:700 15px var(--disp);color:var(--amb);letter-spacing:-.5px;margin-right:20px;white-space:nowrap}
.nav .logo span{color:var(--t3);font-weight:400;font-size:11px;margin-left:5px}
.nav button{padding:0 14px;height:100%;display:flex;align-items:center;font:11px var(--mono);letter-spacing:.5px;text-transform:uppercase;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:.15s}
.nav button:hover{color:var(--t1);background:var(--bgH)}
.nav button.act{color:var(--amb);border-bottom-color:var(--amb)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:14px}

/* ── COMMON ── */
.panel{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:14px;transition:border-color .2s}
.panel:hover{border-color:var(--brdA)}
.phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ptitle{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}

.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.5px}
.tag.al{background:var(--grnD);color:var(--grn)}.tag.sat{background:var(--redD);color:var(--red)}.tag.notr{background:var(--ambD);color:var(--amb)}
.tag.breakout{background:var(--bluD);color:var(--blu)}.tag.trend{background:var(--grnD);color:var(--grn)}.tag.range{background:var(--ambD);color:var(--amb)}.tag.volatile{background:var(--redD);color:var(--red)}

.sbar{display:flex;gap:14px;padding:12px 18px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;margin-bottom:14px;flex-wrap:wrap}
.sbar .si{display:flex;flex-direction:column;gap:1px}
.sbar .sl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
.sbar .sv{font:700 17px var(--disp)}

.search{display:flex;align-items:center;gap:7px;background:var(--bg1);border:1px solid var(--brd);border-radius:8px;padding:0 10px;height:38px;transition:border-color .2s}
.search:focus-within{border-color:var(--amb)}
.search input{flex:1;background:none;border:none;color:var(--t1);font:13px var(--mono);outline:none}
.search input::placeholder{color:var(--t3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 14px;height:34px;border:1px solid var(--brd);border-radius:4px;background:var(--bg1);color:var(--t1);font:11px var(--mono);letter-spacing:.5px;cursor:pointer;transition:.15s;text-transform:uppercase}
.btn:hover{background:var(--bgH);border-color:var(--t3)}
.btn.pri{background:var(--amb);color:#000;border-color:var(--amb);font-weight:600}
.btn.pri:hover{background:#e6a600}
.btn:disabled{opacity:.4;cursor:not-allowed}

table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt thead th{text-align:left;padding:7px 8px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--brd);cursor:pointer;white-space:nowrap;position:sticky;top:0;background:var(--bg2);z-index:1}
table.dt thead th:hover{color:var(--amb)}
table.dt thead th.sorted{color:var(--amb)}
table.dt tbody tr{border-bottom:1px solid var(--brd);transition:background .1s}
table.dt tbody tr:hover{background:var(--bgH)}
table.dt td{padding:7px 8px;white-space:nowrap}

.scorebar{height:4px;background:var(--brd);border-radius:2px;overflow:hidden;width:50px;display:inline-block;vertical-align:middle;margin-right:5px}
.scorebar .fill{height:100%;border-radius:2px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:50px 0;color:var(--t3)}
.spinner{width:28px;height:28px;border:2px solid var(--brd);border-top-color:var(--amb);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtxt{font-size:11px;letter-spacing:1px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--t3);text-align:center;gap:10px}
.empty .icon{font-size:44px;opacity:.3}
.empty .txt{font-size:12px;max-width:300px;line-height:1.6}

.fbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 0}
.fchip{padding:3px 10px;font-size:10px;letter-spacing:.5px;border:1px solid var(--brd);border-radius:16px;background:var(--bg1);color:var(--t2);cursor:pointer;transition:.15s;font-family:var(--mono)}
.fchip:hover{border-color:var(--t3);color:var(--t1)}
.fchip.act{border-color:var(--amb);color:var(--amb);background:var(--ambD)}

.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}

.broker{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--brd)}
.broker .bar{flex:1;height:5px;background:var(--brd);border-radius:3px;overflow:hidden}
.broker .bar .f{height:100%;border-radius:3px}

.err{padding:10px;background:var(--redD);border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:12px;margin-bottom:14px}

@media(max-width:768px){
  .mbar{padding:0 6px}.mbar .mi{padding:0 6px;font-size:10px}
  .nav{padding:0 6px}.nav .logo{font-size:13px;margin-right:10px}.nav button{padding:0 8px;font-size:9px}
  .main{padding:8px}.dgrid{grid-template-columns:1fr}.sbar{flex-direction:column;gap:8px}
  table.dt{font-size:11px}table.dt td,table.dt th{padding:5px 5px}
}
@media(max-width:480px){.nav .logo span{display:none}.mbar .mi:nth-child(n+4){display:none}}
</style>
</head>
<body>
<div id="app">
  <!-- Market Bar -->
  <div class="mbar" id="marketBar"></div>
  <!-- Nav -->
  <div class="nav">
    <div class="logo">BIST TERMINAL<span>v2.0</span></div>
    <button class="act" onclick="go('dashboard')">◉ Analiz</button>
    <button onclick="go('cross')">⚡ Cross Hunter</button>
    <button onclick="go('quantum')">◈ Quantum</button>
    <button onclick="go('takas')">◎ Takas</button>
  </div>
  <!-- Main -->
  <div class="main" id="page"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const STOCKS = [
  {t:"AKBNK",n:"Akbank",s:"Banka"},{t:"ARCLK",n:"Arçelik",s:"Dayanıklı Tüketim"},
  {t:"ASELS",n:"Aselsan",s:"Savunma"},{t:"BIMAS",n:"BİM",s:"Perakende"},
  {t:"DOHOL",n:"Doğan Holding",s:"Holding"},{t:"EKGYO",n:"Emlak Konut",s:"GYO"},
  {t:"ENKAI",n:"Enka İnşaat",s:"İnşaat"},{t:"EREGL",n:"Ereğli Demir Çelik",s:"Metal"},
  {t:"FROTO",n:"Ford Otosan",s:"Otomotiv"},{t:"GARAN",n:"Garanti BBVA",s:"Banka"},
  {t:"GUBRF",n:"Gübre Fabrikaları",s:"Kimya"},{t:"HEKTS",n:"Hektaş",s:"Kimya"},
  {t:"ISCTR",n:"İş Bankası C",s:"Banka"},{t:"KCHOL",n:"Koç Holding",s:"Holding"},
  {t:"KONTR",n:"Kontrolmatik",s:"Enerji"},{t:"KOZAL",n:"Koza Madencilik",s:"Madencilik"},
  {t:"KRDMD",n:"Kardemir D",s:"Metal"},{t:"MGROS",n:"Migros",s:"Perakende"},
  {t:"ODAS",n:"Odaş Elektrik",s:"Enerji"},{t:"OYAKC",n:"Oyak Çimento",s:"Çimento"},
  {t:"PETKM",n:"Petkim",s:"Kimya"},{t:"PGSUS",n:"Pegasus",s:"Havacılık"},
  {t:"SAHOL",n:"Sabancı Holding",s:"Holding"},{t:"SASA",n:"SASA Polyester",s:"Kimya"},
  {t:"SISE",n:"Şişecam",s:"Cam"},{t:"TAVHL",n:"TAV Havalimanları",s:"Havacılık"},
  {t:"TCELL",n:"Turkcell",s:"Telekom"},{t:"THYAO",n:"THY",s:"Havacılık"},
  {t:"TOASO",n:"Tofaş",s:"Otomotiv"},{t:"TUPRS",n:"Tüpraş",s:"Enerji"},
  {t:"YKBNK",n:"Yapı Kredi",s:"Banka"},{t:"AEFES",n:"Anadolu Efes",s:"İçecek"},
  {t:"AKSA",n:"Aksa Akrilik",s:"Kimya"},{t:"TTKOM",n:"Türk Telekom",s:"Telekom"},
  {t:"VESTL",n:"Vestel",s:"Elektronik"},{t:"AGHOL",n:"Ağaoğlu Holding",s:"Holding"},
  {t:"CIMSA",n:"Çimsa",s:"Çimento"},{t:"DOAS",n:"Doğuş Otomotiv",s:"Otomotiv"},
  {t:"TTRAK",n:"Türk Traktör",s:"Otomotiv"},{t:"KOZAA",n:"Koza Altın",s:"Madencilik"},
];
const SECTORS = [...new Set(STOCKS.map(s=>s.s))];

// ═══════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════
async function callAPI(system, userMsg) {
  const r = await fetch('/api/analyze', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({system, messages:[{role:'user',content:userMsg}]})
  });
  if(!r.ok) throw new Error(`API ${r.status}`);
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  const txt = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  const clean = txt.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  return JSON.parse(clean);
}

// ═══════════════════════════════════════════════
// MARKET BAR
// ═══════════════════════════════════════════════
let mbarData = null;
async function loadMarketBar() {
  const el = document.getElementById('marketBar');
  try {
    mbarData = await callAPI(
      'Sen piyasa veri servisisin. Güncel fiyatları bul. SADECE JSON döndür, markdown kullanma.',
      `Güncel fiyatları bul: 1)BIST XU030 2)USD/TRY 3)EUR/TRY 4)Brent petrol USD 5)Gram altın TRY 6)BIST XBANK
JSON: {"xu030":{"price":0,"chg":0},"usdtry":{"price":0,"chg":0},"eurtry":{"price":0,"chg":0},"brent":{"price":0,"chg":0},"gold":{"price":0,"chg":0},"xbank":{"price":0,"chg":0},"ts":"HH:MM"}`
    );
  } catch(e) { console.error('MarketBar:',e); }
  renderMarketBar();
}

function renderMarketBar() {
  const el = document.getElementById('marketBar');
  const items = [
    {k:'xu030',l:'XU030'},{k:'usdtry',l:'USD/TRY'},{k:'eurtry',l:'EUR/TRY'},
    {k:'brent',l:'BRENT'},{k:'gold',l:'ALTIN'},{k:'xbank',l:'XBANK'}
  ];
  let h = items.map(({k,l})=>{
    const d = mbarData?.[k];
    const p = d?.price ?? '—';
    const c = d?.chg ?? 0;
    const cls = c>=0?'up':'dn';
    const ps = typeof p==='number'? p.toLocaleString('tr-TR',{maximumFractionDigits:2}) : p;
    return `<div class="mi"><span class="ml">${l}</span><span class="mp">${ps}</span><span class="mc ${cls}">${c>=0?'+':''}${Number(c).toFixed(2)}%</span></div>`;
  }).join('');
  h += `<div class="mt">${mbarData?.ts||'—'}<button onclick="loadMarketBar()">↻</button></div>`;
  el.innerHTML = h;
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
let currentPage = 'dashboard';
function go(page) {
  currentPage = page;
  document.querySelectorAll('.nav button').forEach((b,i)=>{
    const pages = ['dashboard','cross','quantum','takas'];
    b.className = pages[i]===page?'act':'';
  });
  render();
}

function render() {
  const el = document.getElementById('page');
  switch(currentPage) {
    case 'dashboard': el.innerHTML = dashboardHTML(); break;
    case 'cross':     el.innerHTML = crossHTML(); break;
    case 'quantum':   el.innerHTML = quantumHTML(); break;
    case 'takas':     el.innerHTML = takasHTML(); break;
  }
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function tagHTML(text, type) {
  const cls = type || (text?.includes('AL')?'al': text?.includes('SAT')?'sat':'notr');
  return `<span class="tag ${cls}">${text||''}</span>`;
}

function scorebarHTML(val, max) {
  max = max || 100;
  const pct = Math.min(val/max*100,100);
  const c = pct>=70?'var(--grn)':pct>=40?'var(--amb)':'var(--red)';
  return `<span class="scorebar"><span class="fill" style="width:${pct}%;background:${c}"></span></span><span style="font-size:11px;font-weight:600;color:${c}">${val}</span>`;
}

function loading(msg) {
  return `<div class="loading"><div class="spinner"></div><div class="ldtxt">${msg}</div></div>`;
}

function empty(icon, msg) {
  return `<div class="empty"><div class="icon">${icon}</div><div class="txt">${msg}</div></div>`;
}

// ═══════════════════════════════════════════════
// PAGE: DASHBOARD
// ═══════════════════════════════════════════════
let dashData = null;
function dashboardHTML() {
  let h = `<div style="display:flex;gap:8px;margin-bottom:14px">
    <div class="search" style="flex:1;max-width:400px">
      <span style="color:var(--amb);font-size:14px">⌕</span>
      <input id="dashTicker" placeholder="Hisse kodu — GARAN, THYAO, AKBNK..." onkeydown="if(event.key==='Enter')dashAnalyze()" style="text-transform:uppercase">
    </div>
    <button class="btn pri" onclick="dashAnalyze()">◉ Analiz Et</button>
  </div>`;

  if(!dashData) return h + empty('◉','Hisse kodu girip ANALİZ ET butonuna bas.<br>8 modül birden çalışacak.');
  if(dashData==='loading') return h + loading('Claude analiz ediyor...');
  if(dashData.error) return h + `<div class="err">Hata: ${dashData.error}</div>`;

  const d = dashData;
  // Summary bar
  h += `<div class="sbar">
    <div class="si"><span class="sl">Hisse</span><span class="sv" style="color:var(--amb)">${d.ticker}</span></div>
    <div class="si"><span class="sl">Şirket</span><span class="sv" style="font-size:14px">${d.sirket_adi||''}</span></div>
    <div class="si"><span class="sl">Fiyat</span><span class="sv">₺${(d.guncel_fiyat||0).toLocaleString('tr-TR')}</span></div>
    <div class="si"><span class="sl">Değişim</span><span class="sv" style="color:${d.degisim_pct>=0?'var(--grn)':'var(--red)'}">${d.degisim_pct>=0?'+':''}${d.degisim_pct||0}%</span></div>
    ${d.karar?`<div class="si" style="margin-left:auto"><span class="sl">Karar</span>${tagHTML(d.karar.tavsiye)}</div>`:''}
  </div>`;

  h += '<div class="dgrid">';

  // Piotroski
  if(d.piotroski) {
    const p = d.piotroski;
    h += `<div class="panel"><div class="phead"><span class="ptitle">Piotroski F-Score</span>${tagHTML(p.skor+'/9')}</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">
        <div style="font:800 28px var(--disp);color:${p.skor>=7?'var(--grn)':p.skor>=4?'var(--amb)':'var(--red)'}">${p.skor}</div>
        <p style="color:var(--t2);font-size:11px;line-height:1.5">${p.yorum||''}</p>
      </div>
      ${(p.detaylar||[]).slice(0,5).map(x=>`<div style="font-size:10px;padding:1px 0;color:${x.sonuc?'var(--grn)':'var(--red)'}">${x.sonuc?'✓':'✗'} <span style="color:var(--t2)">${x.kriter}</span></div>`).join('')}
    </div>`;
  }

  // Altman
  if(d.altman) {
    const a = d.altman;
    const zc = a.z_skor>2.99?'var(--grn)':a.z_skor>1.81?'var(--amb)':'var(--red)';
    h += `<div class="panel"><div class="phead"><span class="ptitle">Altman Z-Score</span>${tagHTML(a.risk_seviyesi)}</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
        <div style="font:800 28px var(--disp);color:${zc}">${(a.z_skor||0).toFixed(2)}</div>
        <div style="font-size:10px;color:var(--t3)">&gt;2.99 Güvenli<br>1.81–2.99 Gri<br>&lt;1.81 Tehlike</div>
      </div>
      <p style="color:var(--t2);font-size:11px;line-height:1.5">${a.yorum||''}</p>
    </div>`;
  }

  // Graham
  if(d.graham) {
    const g = d.graham;
    h += `<div class="panel"><div class="phead"><span class="ptitle">Graham Değer Analizi</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><div style="font-size:8px;color:var(--t3);letter-spacing:1px">İÇ DEĞER</div><div style="font:700 20px var(--disp);color:var(--grn)">₺${(g.ic_deger||0).toLocaleString('tr-TR')}</div></div>
        <div style="text-align:right"><div style="font-size:8px;color:var(--t3);letter-spacing:1px">GÜNCEL</div><div style="font:700 20px var(--disp)">₺${(g.guncel_fiyat||0).toLocaleString('tr-TR')}</div></div>
      </div>
      <div style="padding:5px 8px;border-radius:4px;font-size:12px;font-weight:600;text-align:center;background:${g.marj_guvenlik_pct>0?'var(--grnD)':'var(--redD)'};color:${g.marj_guvenlik_pct>0?'var(--grn)':'var(--red)'};margin-bottom:6px">Güvenlik Marjı: ${g.marj_guvenlik_pct>0?'+':''}${g.marj_guvenlik_pct||0}%</div>
      <p style="color:var(--t2);font-size:11px;line-height:1.5">${g.yorum||''}</p>
    </div>`;
  }

  // Teknik
  if(d.teknik) {
    const t = d.teknik;
    h += `<div class="panel"><div class="phead"><span class="ptitle">Teknik Analiz</span>${tagHTML(t.macd_sinyal)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
        ${[{l:'RSI',v:t.rsi,c:t.rsi>70?'var(--red)':t.rsi<30?'var(--grn)':'var(--amb)'},{l:'Trend',v:t.trend},{l:'Destek',v:'₺'+(t.destek||0).toLocaleString('tr-TR')},{l:'Direnç',v:'₺'+(t.direnc||0).toLocaleString('tr-TR')}].map(x=>`<div style="padding:5px 7px;background:var(--bg1);border-radius:4px"><div style="font-size:8px;color:var(--t3);letter-spacing:1px">${x.l}</div><div style="font-size:13px;font-weight:600;color:${x.c||'var(--t1)'}">${x.v}</div></div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--t3)">EMA20:${t.ema20||'—'} | EMA50:${t.ema50||'—'} | EMA200:${t.ema200||'—'}</div>
      <p style="color:var(--t2);font-size:11px;line-height:1.5;margin-top:6px">${t.yorum||''}</p>
    </div>`;
  }

  // Haber
  if(d.haber) {
    const n = d.haber;
    h += `<div class="panel"><div class="phead"><span class="ptitle">Haber & Sentiment</span>${tagHTML(n.sentiment)}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">

  let sigs = (d.signals||[]).filter(s => {
    if(crossFilter!=='all' && s.sinyal_tipi!==crossFilter) return false;

  h += `<div class="panel" style="padding:0;overflow:auto;max-height:calc(100vh - 300px)">

    </tr>`;
  });
  h += '</tbody></table></div>';
  return h;

let qData = null;
let qSort = 'kangal_score', qDir = 'desc';
let qSector = 'all', qSignal = 'all', qRejim = 'all', qMin = 0;

function quantumHTML() {
  let h = `<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <h2 style="font:700 18px var(--disp);color:var(--pur)">◈ Quantum Tarayıcı</h2>

  if(qData.error) return h + `<div class="err">${qData.error}</div>`;

  const stocks = qData.stocks || [];
  const avg = Math.round(stocks.reduce((s,x)=>s+(x.kangal_score||0),0)/Math.max(stocks.length,1));

  h += `<div class="sbar">
    <div class="si"><span class="sl">Piyasa Rejimi</span><span class="sv" style="font-size:14px">${tagHTML(qData.market_rejim||'RANGE', (qData.market_rejim||'range').toLowerCase())}</span></div>

    <div class="si"><span class="sl">AL</span><span class="sv" style="color:var(--grn)">${stocks.filter(s=>s.sinyal==='AL').length}</span></div>
    <div class="si"><span class="sl">SAT</span><span class="sv" style="color:var(--red)">${stocks.filter(s=>s.sinyal==='SAT').length}</span></div>
    <div class="si"><span class="sl">Breakout</span><span class="sv" style="color:var(--blu)">${stocks.filter(s=>s.rejim==='BREAKOUT').length}</span></div>
  </div>`;

  // Filters
  h += `<div class="fbar"><span style="font-size:10px;color:var(--t3)">SEKTÖR:</span>`;
  h += `<button class="fchip ${qSector==='all'?'act':''}" onclick="qSector='all';render()">Tümü</button>`;
  SECTORS.forEach(s => h += `<button class="fchip ${qSector===s?'act':''}" onclick="qSector='${s}';render()">${s}</button>`);
  h += '</div>';

  h += `<div class="fbar" style="padding-top:0"><span style="font-size:10px;color:var(--t3)">SİNYAL:</span>`;
  ['all','AL','SAT','NÖTR'].forEach(s => h += `<button class="fchip ${qSignal===s?'act':''}" onclick="qSignal='${s}';render()">${s==='all'?'Tümü':s}</button>`);
  h += `<span style="margin:0 4px;color:var(--t3)">|</span><span style="font-size:10px;color:var(--t3)">REJİM:</span>`;
  ['all','TREND','BREAKOUT','RANGE','VOLATILE'].forEach(r => h += `<button class="fchip ${qRejim===r?'act':''}" onclick="qRejim='${r}';render()">${r==='all'?'Tümü':r}</button>`);
  h += `<span style="margin:0 4px;color:var(--t3)">|</span><span style="font-size:10px;color:var(--t3)">MIN:</span>`;
  [0,50,60,70,80].forEach(v => h += `<button class="fchip ${qMin===v?'act':''}" onclick="qMin=${v};render()">${v===0?'Tümü':'&gt;'+v}</button>`);
  h += '</div>';

  let list = stocks.map(s => ({...s, sektor: s.sektor || STOCKS.find(x=>x.t===s.ticker)?.s || '—'}));
  if(qSector!=='all') list = list.filter(s=>s.sektor===qSector);
  if(qSignal!=='all') list = list.filter(s=>s.sinyal===qSignal);
  if(qRejim!=='all') list = list.filter(s=>s.rejim===qRejim);
  if(qMin>0) list = list.filter(s=>(s.kangal_score||0)>=qMin);
  list.sort((a,b)=> qDir==='desc'? (b[qSort]||0)-(a[qSort]||0) : (a[qSort]||0)-(b[qSort]||0));

  h += `<div style="font-size:11px;color:var(--t3);margin-bottom:6px">${list.length} / ${stocks.length} hisse</div>`;

  const cols = ['value_score','momentum_score','teknik_score','temel_score','flow_score','kangal_score'];
  const colN = ['Değer','Momentum','Teknik','Temel','Akış','KANGAL'];

  h += `<div class="panel" style="padding:0;overflow:auto;max-height:calc(100vh - 380px)"><table class="dt"><thead><tr>
    <th onclick="qSortBy('ticker')" class="${qSort==='ticker'?'sorted':''}">Hisse</th>
    <th>Sektör</th>
    <th onclick="qSortBy('fiyat')" class="${qSort==='fiyat'?'sorted':''}">Fiyat</th>
    <th onclick="qSortBy('degisim_pct')" class="${qSort==='degisim_pct'?'sorted':''}">Δ%</th>`;
  cols.forEach((c,i) => h += `<th onclick="qSortBy('${c}')" class="${qSort===c?'sorted':''}" ${c==='kangal_score'?'style="color:var(--amb)"':''}>${colN[i]}</th>`);
  h += `<th>Rejim</th><th>Sinyal</th></tr></thead><tbody>`;

  list.forEach(s => {
    h += `<tr>
      <td style="font-weight:700;color:var(--amb)">${s.ticker}</td>
      <td style="color:var(--t3);font-size:10px">${s.sektor}</td>
      <td>₺${(s.fiyat||0).toLocaleString('tr-TR')}</td>
      <td style="color:${(s.degisim_pct||0)>=0?'var(--grn)':'var(--red)'};font-weight:600">${(s.degisim_pct||0)>=0?'+':''}${(s.degisim_pct||0).toFixed(2)}%</td>`;
    cols.forEach(c => h += `<td>${scorebarHTML(s[c]||0)}</td>`);
    h += `<td>${tagHTML(s.rejim, (s.rejim||'range').toLowerCase())}</td>
      <td>${tagHTML(s.sinyal)}</td></tr>`;
  });
  h += '</tbody></table></div>';
  return h;
}

  else { qSort=key; qDir='desc'; }
  render();

  // Brokers
  h += '<div class="panel" style="padding:0">';
  h += `<div style="padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between"><span class="ptitle">Aracı Kurum Net İşlemler</span><span style="font-size:10px;color:var(--t3)">${brokers.length} kurum</span></div>`;
  brokers.forEach(k => {
    const isAl = k.yon==='ALICI';
    const pct = Math.min(Math.abs(k.net_lot||0)/maxLot*100, 100);
    h += `<div class="broker">
      <div style="width:130px;font-weight:600;font-size:12px">${k.kurum}</div>
      <div style="width:70px;text-align:right;font-weight:600;font-size:12px;color:${isAl?'var(--grn)':'var(--red)'}">${isAl?'+':'-'}${Math.abs(k.net_lot||0).toLocaleString('tr-TR')}</div>
      <div class="bar"><div class="f" style="width:${pct}%;background:${isAl?'var(--grn)':'var(--red)'}"></div></div>
      ${tagHTML(k.yon, isAl?'al':'sat')}
      <div style="flex:1;font-size:10px;color:var(--t3);min-width:100px">${k.yorum||''}</div>
    </div>`;
  });
  h += '</div>';

  // Right side
  h += '<div style="display:flex;flex-direction:column;gap:14px">';

  // Kim topluyor
  h += `<div class="panel" style="border-left:3px solid var(--grn);background:linear-gradient(135deg,var(--bg2),#0a1a0a)">
    <div class="ptitle" style="margin-bottom:6px">KİM MAL TOPLUYOR?</div>
    <p style="color:var(--grn);font-size:13px;font-weight:600;line-height:1.6;margin-bottom:6px">${d.analiz?.kim_topluyor||''}</p>
    <p style="color:var(--t2);font-size:11px;line-height:1.5">${d.analiz?.yorum||''}</p>
  </div>`;

  // Blok işlemler
  if(d.blok_islemler?.length > 0) {
    h += `<div class="panel"><div class="ptitle" style="margin-bottom:6px">BLOK İŞLEMLER</div>`;
    d.blok_islemler.forEach(b => {
      h += `<div style="padding:5px 0;border-bottom:1px solid var(--brd);font-size:11px">
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--amb);font-weight:600">${(b.lot||0).toLocaleString('tr-TR')} lot</span>
          <span style="color:var(--t3)">₺${b.fiyat||0}</span>
          <span style="color:var(--t3);font-size:10px">${b.tarih||''}</span>
        </div>
        <div style="color:var(--t2);font-size:10px;margin-top:1px">${b.aciklama||''}</div>
      </div>`;
    });
    h += '</div>';
  }

  h += '</div></div>'; // close right + grid
  return h;
}

  if(!ticker) return;
  takasData = 'loading'; render();
  try {

JSON: {"ticker":"${ticker}","yabanci_oran_pct":0,"yabanci_trend":"Artış|Azalış|Sabit","net_hacim_mn_tl":0,
