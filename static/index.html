<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BistBull</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#04060b;--bg1:#0a0e18;--bg2:#0f1320;--bgH:#161c2e;
  --brd:#1c2440;--brdA:#2a3660;
  --t1:#e2e8f0;--t2:#64748b;--t3:#334155;
  --grn:#10b981;--grnD:#10b98133;--red:#ef4444;--redD:#ef444433;
  --amb:#f59e0b;--ambD:#f59e0b33;--blu:#3b82f6;--bluD:#3b82f633;
  --pur:#8b5cf6;--purD:#8b5cf633;--bull:#f59e0b;
  --mono:'JetBrains Mono',monospace;--disp:'Space Grotesk',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--t1);font:12px var(--mono);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh}

/* MARKET BAR */
.mbar{display:flex;align-items:center;gap:0;padding:0 10px;height:32px;background:var(--bg1);border-bottom:1px solid var(--brd);overflow-x:auto;flex-shrink:0}
.mi{display:flex;align-items:center;gap:6px;padding:0 10px;height:100%;white-space:nowrap;font-size:11px;border-right:1px solid var(--brd)}
.ml{color:var(--t3);font-size:8px;letter-spacing:1.5px;text-transform:uppercase}
.mp{font-weight:600}.mc{font-size:10px;font-weight:500}
.mc.up{color:var(--grn)}.mc.dn{color:var(--red)}
.mtime{margin-left:auto;color:var(--t3);font-size:10px;display:flex;align-items:center;gap:6px}
.mtime button{background:none;border:none;color:var(--t3);cursor:pointer;font:10px var(--mono)}
.mtime button:hover{color:var(--bull)}

/* NAV */
.nav{display:flex;align-items:center;padding:0 12px;height:38px;background:var(--bg1);border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto}
.logo{font:700 16px var(--disp);letter-spacing:-.5px;margin-right:20px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.logo .b{color:var(--bull)}.logo .u{color:var(--t1)}.logo .v{color:var(--t3);font-weight:400;font-size:10px}
.nav button{padding:0 14px;height:100%;display:flex;align-items:center;gap:4px;font:11px var(--mono);letter-spacing:.5px;text-transform:uppercase;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:.15s}
.nav button:hover{color:var(--t1);background:var(--bgH)}
.nav button.act{color:var(--bull);border-bottom-color:var(--bull)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:14px}

/* COMPONENTS */
.panel{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:14px;transition:border-color .2s}
.panel:hover{border-color:var(--brdA)}
.phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ptitle{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.5px}
.tag.al{background:var(--grnD);color:var(--grn)}.tag.sat{background:var(--redD);color:var(--red)}.tag.notr{background:var(--ambD);color:var(--amb)}
.tag.breakout{background:var(--bluD);color:var(--blu)}.tag.trend{background:var(--grnD);color:var(--grn)}.tag.range{background:var(--ambD);color:var(--amb)}.tag.volatile{background:var(--redD);color:var(--red)}

.sbar{display:flex;gap:14px;padding:12px 18px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;margin-bottom:14px;flex-wrap:wrap}
.si{display:flex;flex-direction:column;gap:1px}.sl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}.sv{font:700 17px var(--disp)}

.search{display:flex;align-items:center;gap:7px;background:var(--bg1);border:1px solid var(--brd);border-radius:8px;padding:0 10px;height:38px;transition:border-color .2s}
.search:focus-within{border-color:var(--bull)}
.search input{flex:1;background:none;border:none;color:var(--t1);font:13px var(--mono);outline:none}
.search input::placeholder{color:var(--t3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 14px;height:34px;border:1px solid var(--brd);border-radius:6px;background:var(--bg1);color:var(--t1);font:11px var(--mono);letter-spacing:.5px;cursor:pointer;transition:.15s;text-transform:uppercase}
.btn:hover{background:var(--bgH);border-color:var(--t3)}
.btn.pri{background:var(--bull);color:#000;border-color:var(--bull);font-weight:700}
.btn.pri:hover{background:#e6a600}
.btn:disabled{opacity:.4;cursor:not-allowed}

table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt thead th{text-align:left;padding:7px 8px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--brd);cursor:pointer;white-space:nowrap;position:sticky;top:0;background:var(--bg2);z-index:1}
table.dt thead th:hover,table.dt thead th.sorted{color:var(--bull)}
table.dt tbody tr{border-bottom:1px solid var(--brd);transition:background .1s}
table.dt tbody tr:hover{background:var(--bgH)}
table.dt td{padding:7px 8px;white-space:nowrap}

.scorebar{height:4px;background:var(--brd);border-radius:2px;overflow:hidden;width:50px;display:inline-block;vertical-align:middle;margin-right:5px}
.scorebar .fill{height:100%;border-radius:2px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:50px 0;color:var(--t3)}
.spinner{width:28px;height:28px;border:2px solid var(--brd);border-top-color:var(--bull);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtxt{font-size:11px;letter-spacing:1px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--t3);text-align:center;gap:10px}
.empty .icon{font-size:44px;opacity:.3}.empty .txt{font-size:12px;max-width:340px;line-height:1.6}

.fbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 0}
.fchip{padding:3px 10px;font-size:10px;letter-spacing:.5px;border:1px solid var(--brd);border-radius:16px;background:var(--bg1);color:var(--t2);cursor:pointer;transition:.15s;font-family:var(--mono)}
.fchip:hover{border-color:var(--t3);color:var(--t1)}
.fchip.act{border-color:var(--bull);color:var(--bull);background:var(--ambD)}

.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.err{padding:10px;background:var(--redD);border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:12px;margin-bottom:14px}

.broker{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--brd)}
.broker .bar{flex:1;height:5px;background:var(--brd);border-radius:3px;overflow:hidden}
.broker .bar .f{height:100%;border-radius:3px}

@media(max-width:768px){
  .mbar{padding:0 4px}.mi{padding:0 6px;font-size:10px}
  .nav{padding:0 6px}.logo{font-size:14px;margin-right:10px}.nav button{padding:0 8px;font-size:9px}
  .main{padding:8px}.dgrid{grid-template-columns:1fr}.sbar{flex-direction:column;gap:8px}
  table.dt{font-size:10px}table.dt td,table.dt th{padding:5px 5px}
}
@media(max-width:480px){.logo .v{display:none}.mi:nth-child(n+5){display:none}}
</style>
</head>
<body>
<div id="app">
  <div class="mbar" id="marketBar"></div>
  <div class="nav">
    <div class="logo"><span class="b">Bist</span><span class="u">Bull</span><span class="v">v2.0</span></div>
    <button class="act" onclick="go('radar')">⚡ Radar</button>
    <button onclick="go('analiz')">◉ Analiz</button>
    <button onclick="go('cross')">⚔ Cross</button>
    <button onclick="go('quantum')">◈ Quantum</button>
    <button onclick="go('takas')">◎ Takas</button>
  </div>
  <div class="main" id="page"></div>
</div>

<script>
// ══════════════ CONFIG ══════════════
const STOCKS=[
  {t:"AKBNK",s:"Banka"},{t:"ARCLK",s:"Dayanıklı"},{t:"ASELS",s:"Savunma"},{t:"BIMAS",s:"Perakende"},
  {t:"DOHOL",s:"Holding"},{t:"EKGYO",s:"GYO"},{t:"ENKAI",s:"İnşaat"},{t:"EREGL",s:"Metal"},
  {t:"FROTO",s:"Otomotiv"},{t:"GARAN",s:"Banka"},{t:"GUBRF",s:"Kimya"},{t:"HEKTS",s:"Kimya"},
  {t:"ISCTR",s:"Banka"},{t:"KCHOL",s:"Holding"},{t:"KONTR",s:"Enerji"},{t:"KOZAL",s:"Madencilik"},
  {t:"KRDMD",s:"Metal"},{t:"MGROS",s:"Perakende"},{t:"ODAS",s:"Enerji"},{t:"OYAKC",s:"Çimento"},
  {t:"PETKM",s:"Kimya"},{t:"PGSUS",s:"Havacılık"},{t:"SAHOL",s:"Holding"},{t:"SASA",s:"Kimya"},
  {t:"SISE",s:"Cam"},{t:"TAVHL",s:"Havacılık"},{t:"TCELL",s:"Telekom"},{t:"THYAO",s:"Havacılık"},
  {t:"TOASO",s:"Otomotiv"},{t:"TUPRS",s:"Enerji"},{t:"YKBNK",s:"Banka"},{t:"AEFES",s:"İçecek"},
  {t:"AKSA",s:"Kimya"},{t:"TTKOM",s:"Telekom"},{t:"VESTL",s:"Elektronik"},{t:"CIMSA",s:"Çimento"},
  {t:"DOAS",s:"Otomotiv"},{t:"TTRAK",s:"Otomotiv"},{t:"KOZAA",s:"Madencilik"},{t:"AGHOL",s:"Holding"},
];
const SECTORS=[...new Set(STOCKS.map(s=>s.s))];

// ══════════════ API ══════════════
async function callAPI(system, userMsg){
  const r=await fetch('/api/analyze',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system,messages:[{role:'user',content:userMsg}]})
  });
  const d=await r.json();
  if(!r.ok) throw new Error(typeof d.error==='string'?d.error:JSON.stringify(d.error||d));
  if(d.error) throw new Error(typeof d.error==='string'?d.error:d.error.message||JSON.stringify(d.error));
  const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  if(!txt) throw new Error('Boş yanıt');
  const clean=txt.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  try{return JSON.parse(clean)}catch(e){throw new Error('JSON parse: '+clean.slice(0,200))}
}

// ══════════════ MARKET BAR ══════════════
let mbar=null;
async function loadMbar(){
  try{
    const r=await fetch('/api/marketbar',{method:'POST'});
    mbar=await r.json();
  }catch(e){console.error('Mbar:',e)}
  renderMbar();
}
function renderMbar(){
  const el=document.getElementById('marketBar');
  const its=[{k:'xu030',l:'XU030'},{k:'xu100',l:'XU100'},{k:'usdtry',l:'USD/TRY'},{k:'eurtry',l:'EUR/TRY'},{k:'brent',l:'BRENT'},{k:'gold',l:'ALTIN'},{k:'xbank',l:'XBANK'},{k:'btc',l:'BTC'}];
  let h=its.map(({k,l})=>{
    const d=mbar?.[k];const p=d?.p??'—';const c=d?.c??0;
    const ps=typeof p==='number'?p.toLocaleString('tr-TR',{maximumFractionDigits:2}):p;
    return `<div class="mi"><span class="ml">${l}</span><span class="mp">${ps}</span><span class="mc ${c>=0?'up':'dn'}">${c>=0?'+':''}${Number(c).toFixed(2)}%</span></div>`;
  }).join('');
  h+=`<div class="mtime">${mbar?.ts||'—'}<button onclick="loadMbar()">↻</button></div>`;
  el.innerHTML=h;
}

// ══════════════ NAV ══════════════
let page='radar';
function go(p){
  page=p;
  document.querySelectorAll('.nav button').forEach((b,i)=>{
    b.className=['radar','analiz','cross','quantum','takas'][i]===p?'act':'';
  });
  render();
}
function render(){
  const el=document.getElementById('page');
  switch(page){
    case 'radar':el.innerHTML=radarHTML();break;
    case 'analiz':el.innerHTML=analizHTML();break;
    case 'cross':el.innerHTML=crossHTML();break;
    case 'quantum':el.innerHTML=quantumHTML();break;
    case 'takas':el.innerHTML=takasHTML();break;
  }
}

// ══════════════ HELPERS ══════════════
function tag(t,type){const c=type||(t?.includes('AL')?'al':t?.includes('SAT')?'sat':'notr');return `<span class="tag ${c}">${t||''}</span>`}
function sbar(v,mx){mx=mx||100;const p=Math.min(v/mx*100,100);const c=p>=70?'var(--grn)':p>=40?'var(--amb)':'var(--red)';return `<span class="scorebar"><span class="fill" style="width:${p}%;background:${c}"></span></span><span style="font-size:11px;font-weight:600;color:${c}">${v}</span>`}
function ld(m){return `<div class="loading"><div class="spinner"></div><div class="ldtxt">${m}</div></div>`}
function emp(i,m){return `<div class="empty"><div class="icon">${i}</div><div class="txt">${m}</div></div>`}

// ══════════════ PAGE: RADAR ══════════════
let radarD=null,xRadarD=null;

function radarHTML(){
  let h=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <h2 style="font:700 18px var(--disp);color:var(--bull)">⚡ Piyasa Radarı</h2>
    <button class="btn" onclick="loadRadar()" style="margin-left:auto">↻ Yenile</button>
  </div>`;

  if(radarD==='loading') h+=ld('Piyasa radarı yükleniyor...');
  else if(radarD && !radarD.error){
    const r=radarD;
    h+=`<div class="sbar" style="margin-bottom:10px">
      <div class="si"><span class="sl">Piyasa</span><span class="sv" style="font-size:14px">${tag(r.piyasa_modu||'NÖTR',(r.piyasa_modu||'').includes('YÜK')?'al':(r.piyasa_modu||'').includes('DÜŞ')?'sat':'notr')}</span></div>
      <div class="si"><span class="sl">Korku/Açgözlülük</span><span class="sv" style="color:${(r.fear_greed||50)>60?'var(--grn)':(r.fear_greed||50)<40?'var(--red)':'var(--amb)'}">${r.fear_greed||'—'}/100</span></div>
      <div class="si"><span class="sl">Hacim</span><span class="sv" style="font-size:14px">${r.hacim||'—'}</span></div>
      <div class="si"><span class="sl">Trend</span><span class="sv" style="font-size:14px">${r.trend||'—'}</span></div>
    </div>`;
    if(r.sicak?.length){
      h+=`<div class="ptitle" style="margin-bottom:8px">🔥 EN SICAK HİSSELER</div>`;
      h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:14px">';
      r.sicak.forEach(s=>{
        const c=(s.chg||0)>=0?'var(--grn)':'var(--red)';
        h+=`<div class="panel" style="padding:10px;cursor:pointer" onclick="go('analiz');setTimeout(()=>{document.getElementById('aTicker').value='${s.t}';analizRun()},100)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font:700 14px var(--disp);color:var(--bull)">${s.t}</span>
            <span style="font-size:12px;font-weight:600;color:${c}">${(s.chg||0)>=0?'+':''}${s.chg||0}%</span>
          </div>
          <div style="font-size:10px;color:var(--t2);margin-bottom:3px">${s.why||''}</div>
          ${tag(s.sig||'NÖTR')}
        </div>`;
      });
      h+='</div>';
    }
    if(r.ozet) h+=`<div class="panel" style="margin-bottom:14px;border-left:3px solid var(--bull)">
      <div class="ptitle" style="margin-bottom:6px">📋 GÜNLÜK ÖZET</div>
      <p style="color:var(--t2);font-size:12px;line-height:1.7">${r.ozet}</p></div>`;
  } else if(radarD?.error) h+=`<div class="err">Radar: ${radarD.error}</div>`;

  // X Radar
  h+=`<div style="display:flex;gap:10px;align-items:center;margin:14px 0 10px">
    <h2 style="font:700 16px var(--disp);color:var(--blu)">🐦 X / Twitter Radar</h2>
    <button class="btn" onclick="loadXRadar()" style="margin-left:auto">↻</button>
  </div>`;
  if(xRadarD==='loading') h+=ld('X sentiment taranıyor...');
  else if(xRadarD && !xRadarD.error){
    const x=xRadarD;
    h+=`<div class="sbar" style="margin-bottom:10px">
      <div class="si"><span class="sl">Sentiment</span><span class="sv" style="color:${(x.skor||50)>60?'var(--grn)':(x.skor||50)<40?'var(--red)':'var(--amb)'}">${x.skor||'—'}/100</span></div>
      <div class="si"><span class="sl">Mood</span><span class="sv" style="font-size:14px">${x.mood||'—'}</span></div>
      <div class="si"><span class="sl">Trend</span><span class="sv" style="font-size:13px;color:var(--bull)">${x.konu||'—'}</span></div>
    </div>`;
    if(x.hesaplar?.length){
      h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;margin-bottom:14px">';
      x.hesaplar.forEach(a=>{
        const sc=(a.s||'Nötr')==='Pozitif'?'var(--grn)':(a.s||'Nötr')==='Negatif'?'var(--red)':'var(--amb)';
        h+=`<div class="panel" style="padding:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-weight:600;color:${sc}">@${a.h}</span>${tag(a.s||'Nötr')}
          </div>
          <div style="font-size:11px;color:var(--t2);line-height:1.5">${a.o||''}</div>
          ${a.t?`<div style="font-size:10px;color:var(--bull);margin-top:3px">→ ${a.t}</div>`:''}
        </div>`;
      });
      h+='</div>';
    }
  } else if(xRadarD?.error) h+=`<div class="err">X: ${xRadarD.error}</div>`;
  return h;
}

async function loadRadar(){
  radarD='loading';render();
  try{
    const r=await fetch('/api/radar',{method:'POST'});
    radarD=await r.json();
  }catch(e){radarD={error:e.message}}
  render();
}
async function loadXRadar(){
  xRadarD='loading';render();
  try{
    xRadarD=await callAPI('X/Twitter finans sentiment analistsin. SADECE JSON, markdown yok.',
      `Bugün finans X/Twitter'da ne konuşuluyor? @DeItaone @zerohedge @NickTimiraos @unusual_whales @ForeksTurkey @BloombergHT paylaşımlarını analiz et.
{"skor":50,"mood":"Risk-On|Risk-Off|Karışık","konu":"en çok konuşulan","hesaplar":[{"h":"DeItaone","s":"Pozitif|Negatif|Nötr","o":"ne paylaştı kısa","t":"ilgili hisseler varsa"}]}`);
  }catch(e){xRadarD={error:e.message}}
  render();
}

// ══════════════ PAGE: ANALİZ ══════════════
let analizD=null;
function analizHTML(){
  let h=`<div style="display:flex;gap:8px;margin-bottom:14px">
    <div class="search" style="flex:1;max-width:400px">
      <span style="color:var(--bull)">⌕</span>
      <input id="aTicker" placeholder="GARAN, THYAO, AKBNK..." onkeydown="if(event.key==='Enter')analizRun()" style="text-transform:uppercase">
    </div>
    <button class="btn pri" onclick="analizRun()">◉ Analiz</button>
  </div>`;
  if(!analizD) return h+emp('◉','Hisse kodu gir, 8 modül analiz çalışacak.');
  if(analizD==='loading') return h+ld('Analiz yapılıyor...');
  if(analizD.error) return h+`<div class="err">${analizD.error}</div>`;
  const d=analizD;

  h+=`<div class="sbar">
    <div class="si"><span class="sl">Hisse</span><span class="sv" style="color:var(--bull)">${d.ticker}</span></div>
    <div class="si"><span class="sl">Şirket</span><span class="sv" style="font-size:14px">${d.ad||''}</span></div>
    <div class="si"><span class="sl">Fiyat</span><span class="sv">₺${(d.fiyat||0).toLocaleString('tr-TR')}</span></div>
    <div class="si"><span class="sl">Δ%</span><span class="sv" style="color:${(d.chg||0)>=0?'var(--grn)':'var(--red)'}">${(d.chg||0)>=0?'+':''}${d.chg||0}%</span></div>
    ${d.karar?`<div class="si" style="margin-left:auto"><span class="sl">Karar</span>${tag(d.karar)}</div>`:''}
  </div><div class="dgrid">`;

  // Piotroski
  if(d.pio) h+=`<div class="panel"><div class="phead"><span class="ptitle">Piotroski F-Score</span>${tag(d.pio.s+'/9')}</div>
    <div style="font:800 28px var(--disp);color:${d.pio.s>=7?'var(--grn)':d.pio.s>=4?'var(--amb)':'var(--red)'};margin-bottom:6px}">${d.pio.s}</div>
    <p style="color:var(--t2);font-size:11px;line-height:1.5">${d.pio.y||''}</p></div>`;
  // Altman
  if(d.alt) h+=`<div class="panel"><div class="phead"><span class="ptitle">Altman Z-Score</span>${tag(d.alt.r)}</div>
    <div style="font:800 28px var(--disp);color:${d.alt.z>2.99?'var(--grn)':d.alt.z>1.81?'var(--amb)':'var(--red)'};margin-bottom:6px}">${(d.alt.z||0).toFixed(2)}</div>
    <p style="color:var(--t2);font-size:11px;line-height:1.5">${d.alt.y||''}</p></div>`;
  // Graham
  if(d.gra) h+=`<div class="panel"><div class="phead"><span class="ptitle">Graham Değer</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <div><div style="font-size:8px;color:var(--t3)">İÇ DEĞER</div><div style="font:700 18px var(--disp);color:var(--grn)">₺${(d.gra.iv||0).toLocaleString('tr-TR')}</div></div>
      <div style="text-align:right"><div style="font-size:8px;color:var(--t3)">MOS</div><div style="font:700 18px var(--disp);color:${(d.gra.mos||0)>0?'var(--grn)':'var(--red)'}">${(d.gra.mos||0)>0?'+':''}${d.gra.mos||0}%</div></div>
    </div><p style="color:var(--t2);font-size:11px;line-height:1.5">${d.gra.y||''}</p></div>`;
  // Teknik
  if(d.tek) h+=`<div class="panel"><div class="phead"><span class="ptitle">Teknik</span>${tag(d.tek.sig)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      ${[{l:'RSI',v:d.tek.rsi,c:d.tek.rsi>70?'var(--red)':d.tek.rsi<30?'var(--grn)':'var(--amb)'},{l:'Trend',v:d.tek.tr},{l:'Destek',v:'₺'+d.tek.sup},{l:'Direnç',v:'₺'+d.tek.res}].map(x=>`<div style="padding:4px 6px;background:var(--bg1);border-radius:4px"><div style="font-size:8px;color:var(--t3)">${x.l}</div><div style="font-size:12px;font-weight:600;color:${x.c||'var(--t1)'}">${x.v}</div></div>`).join('')}
    </div><p style="color:var(--t2);font-size:11px;line-height:1.5">${d.tek.y||''}</p></div>`;
  // Haber
  if(d.hab) h+=`<div class="panel"><div class="phead"><span class="ptitle">Haber</span>${tag(d.hab.sen)}</div>
    <div style="font:800 20px var(--disp);color:${(d.hab.sk||50)>60?'var(--grn)':(d.hab.sk||50)<40?'var(--red)':'var(--amb)'};margin-bottom:6px}">${d.hab.sk||0}/100</div>
    ${(d.hab.news||[]).slice(0,3).map(n=>`<div style="padding:2px 0;border-bottom:1px solid var(--brd);font-size:11px;color:var(--t2)">${n}</div>`).join('')}</div>`;
  // VİOP
  if(d.vio) h+=`<div class="panel"><div class="phead"><span class="ptitle">VİOP</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div style="padding:4px 6px;background:var(--bg1);border-radius:4px"><div style="font-size:8px;color:var(--t3)">AÇIK POZ.</div><div style="font-size:12px;font-weight:600">${d.vio.oi||'—'}</div></div>
      <div style="padding:4px 6px;background:var(--bg1);border-radius:4px"><div style="font-size:8px;color:var(--t3)">BAZ FARKI</div><div style="font-size:12px;font-weight:600;color:var(--amb)">${d.vio.baz||0}%</div></div>
    </div><p style="color:var(--t2);font-size:11px;line-height:1.5">${d.vio.y||''}</p></div>`;
  // DCF
  if(d.dcf) h+=`<div class="panel"><div class="phead"><span class="ptitle">DCF Hedef</span>${tag(d.dcf.tav)}</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <div><div style="font-size:8px;color:var(--t3)">HEDEF</div><div style="font:800 18px var(--disp);color:var(--blu)">₺${(d.dcf.hp||0).toLocaleString('tr-TR')}</div></div>
      <div style="text-align:right"><div style="font-size:8px;color:var(--t3)">POTANSİYEL</div><div style="font:800 18px var(--disp);color:${(d.dcf.pot||0)>0?'var(--grn)':'var(--red)'}">${(d.dcf.pot||0)>0?'+':''}${d.dcf.pot||0}%</div></div>
    </div><p style="color:var(--t2);font-size:11px;line-height:1.5">${d.dcf.y||''}</p></div>`;
  // Rakip
  if(d.rak?.length) h+=`<div class="panel"><div class="phead"><span class="ptitle">Rakipler</span></div>
    <table class="dt"><thead><tr><th>Hisse</th><th>F/K</th><th>PD/DD</th><th>YTD</th></tr></thead><tbody>
    ${d.rak.map(r=>`<tr><td style="font-weight:600;color:var(--bull)">${r.t}</td><td>${r.fk}</td><td>${r.pd}</td><td style="color:${(r.ytd||0)>=0?'var(--grn)':'var(--red)'}">${(r.ytd||0)>=0?'+':''}${r.ytd}%</td></tr>`).join('')}
    </tbody></table></div>`;

  h+='</div>'; // close grid
  if(d.ozet) h+=`<div style="margin-top:14px;padding:14px 18px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;border-left:3px solid ${d.karar?.includes('AL')?'var(--grn)':d.karar?.includes('SAT')?'var(--red)':'var(--amb)'}">
    <div class="ptitle" style="margin-bottom:6px">GENEL DEĞERLENDİRME</div>
    <p style="color:var(--t2);font-size:12px;line-height:1.7">${d.ozet}</p></div>`;
  h+=`<div style="text-align:center;color:var(--t3);font-size:8px;margin-top:14px;letter-spacing:2px">BistBull AI ANALİZ · YATIRIM TAVSİYESİ DEĞİLDİR</div>`;
  return h;
}

// ══════════════ PAGE: CROSS HUNTER ══════════════
let crossD=null,crossF='all',crossDir='all';
function crossHTML(){
  let h=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
    <h2 style="font:700 18px var(--disp);color:var(--bull)">⚔ Cross Hunter</h2>
    <span style="font-size:11px;color:var(--t3)">${STOCKS.length} hisse · 6 sinyal</span>
    <button class="btn pri" onclick="crossRun()" style="margin-left:auto">⚔ Tara</button>
  </div>`;
  if(!crossD) return h+emp('⚔','Taramayı başlat. EMA, RSI, MACD cross sinyalleri taranacak.');
  if(crossD==='loading') return h+ld('40 hisse taranıyor...');
  if(crossD.error) return h+`<div class="err">${crossD.error}</div>`;

  h+=`<div class="sbar">
    <div class="si"><span class="sl">Toplam</span><span class="sv" style="color:var(--bull)">${crossD.sigs?.length||0}</span></div>
    <div class="si"><span class="sl">AL</span><span class="sv" style="color:var(--grn)">${crossD.al||0}</span></div>
    <div class="si"><span class="sl">SAT</span><span class="sv" style="color:var(--red)">${crossD.sat||0}</span></div>
  </div>`;

  let sigs=(crossD.sigs||[]).sort((a,b)=>b.g-a.g);
  h+=`<div class="panel" style="padding:0;overflow:auto;max-height:calc(100vh - 260px)">
    <table class="dt"><thead><tr><th>Hisse</th><th>Sinyal</th><th>Yön</th><th>Güç</th><th>Açıklama</th></tr></thead><tbody>`;
  sigs.forEach(s=>{
    h+=`<tr><td style="font-weight:700;color:var(--bull)">${s.t}</td>
      <td><span style="padding:2px 5px;border-radius:3px;font-size:10px;background:var(--bluD);color:var(--blu)">${s.tip}</span></td>
      <td>${tag(s.d)}</td><td>${sbar(s.g,10)}</td>
      <td style="color:var(--t2);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis">${s.a||''}</td></tr>`;
  });
  if(!sigs.length) h+=`<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t3)">Sinyal yok</td></tr>`;
  h+='</tbody></table></div>';
  return h;
}

// ══════════════ PAGE: QUANTUM ══════════════
let qD=null,qSort='ks',qDir='desc';
function quantumHTML(){
  let h=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
    <h2 style="font:700 18px var(--disp);color:var(--pur)">◈ Quantum Tarayıcı</h2>
    <button class="btn pri" onclick="qRun()" style="margin-left:auto">◈ Tara</button>
  </div>`;
  if(!qD) return h+emp('◈','40 hisseye 6 boyutlu KANGAL skor atanacak.');
  if(qD==='loading') return h+ld('Quantum tarama...');
  if(qD.error) return h+`<div class="err">${qD.error}</div>`;

  const cols=['vs','ms','ts','fs','fls','ks'];
  const colN=['Değer','Momentum','Teknik','Temel','Akış','KANGAL'];
  let list=[...(qD.stocks||[])];
  list.sort((a,b)=>qDir==='desc'?(b[qSort]||0)-(a[qSort]||0):(a[qSort]||0)-(b[qSort]||0));

  h+=`<div class="panel" style="padding:0;overflow:auto;max-height:calc(100vh - 200px)"><table class="dt"><thead><tr>
    <th>Hisse</th><th>Fiyat</th><th>Δ%</th>`;
  cols.forEach((c,i)=>h+=`<th onclick="qSort='${c}';qDir=qDir==='desc'?'asc':'desc';render()" class="${qSort===c?'sorted':''}" ${c==='ks'?'style="color:var(--bull)"':''}>${colN[i]}</th>`);
  h+=`<th>Rejim</th><th>Sinyal</th></tr></thead><tbody>`;
  list.forEach(s=>{
    h+=`<tr><td style="font-weight:700;color:var(--bull)">${s.t}</td>
      <td>₺${(s.p||0).toLocaleString('tr-TR')}</td>
      <td style="color:${(s.chg||0)>=0?'var(--grn)':'var(--red)'};font-weight:600">${(s.chg||0)>=0?'+':''}${(s.chg||0).toFixed(1)}%</td>`;
    cols.forEach(c=>h+=`<td>${sbar(s[c]||0)}</td>`);
    h+=`<td>${tag(s.rej,(s.rej||'range').toLowerCase())}</td><td>${tag(s.sig)}</td></tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

// ══════════════ PAGE: TAKAS ══════════════
let takD=null;
function takasHTML(){
  let h=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
    <h2 style="font:700 18px var(--disp);color:var(--blu)">◎ Takas Analizi</h2>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <div class="search" style="flex:1;max-width:400px">
      <span style="color:var(--blu)">◎</span>
      <input id="tTicker" placeholder="GARAN, THYAO..." onkeydown="if(event.key==='Enter')takRun()" style="text-transform:uppercase">
    </div>
    <button class="btn pri" onclick="takRun()">◎ Analiz</button>
  </div>`;
  if(!takD) return h+emp('◎','Aracı kurum bazlı alım/satım — kim mal topluyor?');
  if(takD==='loading') return h+ld('Takas analiz...');
  if(takD.error) return h+`<div class="err">${takD.error}</div>`;
  const d=takD;

  h+=`<div class="sbar">
    <div class="si"><span class="sl">Hisse</span><span class="sv" style="color:var(--bull)">${d.ticker}</span></div>
    <div class="si"><span class="sl">Yabancı</span><span class="sv">%${d.yab||0}</span></div>
    <div class="si"><span class="sl">Yabancı Trend</span><span class="sv" style="color:${d.ytrend==='Artış'?'var(--grn)':d.ytrend==='Azalış'?'var(--red)':'var(--amb)'};font-size:14px}">${d.ytrend||'—'}</span></div>
    <div class="si"><span class="sl">Kurumsal</span><span class="sv" style="font-size:14px">${tag(d.ilgi||'Orta',d.ilgi==='Yüksek'?'al':d.ilgi==='Düşük'?'sat':'notr')}</span></div>
  </div>`;

  if(d.kim) h+=`<div class="panel" style="margin-bottom:14px;border-left:3px solid var(--grn);background:linear-gradient(135deg,var(--bg2),#061a0a)">
    <div class="ptitle" style="margin-bottom:6px">KİM MAL TOPLUYOR?</div>
    <p style="color:var(--grn);font-size:13px;font-weight:600;line-height:1.6">${d.kim}</p></div>`;

  if(d.kurumlar?.length){
    const mx=Math.max(...d.kurumlar.map(k=>Math.abs(k.lot||0)),1);
    h+=`<div class="panel" style="padding:0">`;
    d.kurumlar.forEach(k=>{
      const al=k.yon==='ALICI';const pct=Math.min(Math.abs(k.lot||0)/mx*100,100);
      h+=`<div class="broker">
        <div style="width:120px;font-weight:600;font-size:11px">${k.ad}</div>
        <div style="width:70px;text-align:right;font-weight:600;font-size:11px;color:${al?'var(--grn)':'var(--red)'}">${al?'+':'-'}${Math.abs(k.lot||0).toLocaleString('tr-TR')}</div>
        <div class="bar"><div class="f" style="width:${pct}%;background:${al?'var(--grn)':'var(--red)'}"></div></div>
        ${tag(k.yon,al?'al':'sat')}
      </div>`;
    });
    h+='</div>';
  }
  return h;
}
async function takRun(){
  const t=document.getElementById('tTicker')?.value?.trim().toUpperCase();
  if(!t)return;takD='loading';render();
  try{
    const r=await fetch('/api/takas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker:t})});
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    takD=d;
  }catch(e){takD={error:e.message}}
  render();
}
