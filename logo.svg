<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
  </defs>
  <!-- Aggressive Bull Head - horns forward -->
  <g transform="translate(10,10)">
    <!-- Left horn -->
    <path d="M25,55 Q5,20 2,5 Q8,18 22,35 Z" fill="url(#bullGrad)" opacity="0.9"/>
    <!-- Right horn -->
    <path d="M65,55 Q85,20 88,5 Q82,18 68,35 Z" fill="url(#bullGrad)" opacity="0.9"/>
    <!-- Head -->
    <ellipse cx="45" cy="62" rx="28" ry="22" fill="url(#bullGrad)"/>
    <!-- Snout -->
    <ellipse cx="45" cy="78" rx="18" ry="12" fill="#00c853"/>
    <!-- Nostrils -->
    <ellipse cx="38" cy="79" rx="3" ry="2.5" fill="#0a0f18"/>
    <ellipse cx="52" cy="79" rx="3" ry="2.5" fill="#0a0f18"/>
    <!-- Eyes - aggressive -->
    <ellipse cx="33" cy="58" rx="5" ry="4" fill="#0a0f18"/>
    <ellipse cx="57" cy="58" rx="5" ry="4" fill="#0a0f18"/>
    <ellipse cx="34" cy="57" rx="2" ry="1.5" fill="#eaf0fa"/>
    <ellipse cx="58" cy="57" rx="2" ry="1.5" fill="#eaf0fa"/>
    <!-- Brow ridge - angry look -->
    <path d="M25,52 Q33,48 38,51" stroke="#0a0f18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M65,52 Q57,48 52,51" stroke="#0a0f18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Neck/body hint -->
    <path d="M20,80 Q45,100 70,80" fill="url(#bullGrad)" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="115" y="58" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="42" fill="#eaf0fa" letter-spacing="-2">BIST</text>
  <text x="243" y="58" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="42" fill="#00e676" letter-spacing="-2">BULL</text>
  <!-- Tagline -->
  <text x="115" y="82" font-family="'JetBrains Mono',monospace" font-weight="400" font-size="12" fill="#5a6e90" letter-spacing="3">INTELLIGENCE TERMINAL</text>
  <!-- Subtle line -->
  <line x1="115" y1="88" x2="340" y2="88" stroke="#1a2540" stroke-width="1"/>
  <!-- Small powered text -->
  <text x="115" y="102" font-family="'DM Sans',sans-serif" font-weight="400" font-size="9" fill="#3a4d6a">Yapay Zeka Destekli Yatırım Asistanı</text>
</svg>
