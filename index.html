<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BistBull Terminal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🐂</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--bg0:#060a10;--bg1:#0a0f18;--bg2:#0e1420;--bg3:#121a2a;--bg4:#182236;--bdr:#1a2540;--bdr2:#243352;--t1:#eaf0fa;--t2:#8fa0c0;--t3:#5a6e90;--t4:#3a4d6a;--grn:#00e676;--grn2:#00c853;--grnd:rgba(0,230,118,.12);--red:#ff3d57;--redd:rgba(255,61,87,.12);--ylw:#ffc107;--ylwd:rgba(255,193,7,.12);--blu:#2196f3;--blud:rgba(33,150,243,.12);--cyn:#00e5ff;--orn:#ff9100;--prp:#bb86fc;--prpd:rgba(187,134,252,.12);--rad:5px;--rad2:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg1);}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
.mono{font-family:'JetBrains Mono',monospace;color:var(--t1);}
/* HEADER */
.hdr{background:var(--bg1);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:100;gap:16px;}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;white-space:nowrap;letter-spacing:-.5px;color:var(--t1);}.logo b{color:var(--grn);}.logo small{color:var(--t3);font-weight:400;font-size:10px;margin-left:6px;}
.hdr-nav{display:flex;gap:1px;margin-left:16px;}
.nav-b{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:6px 14px;background:0;color:var(--t3);border:0;cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;transition:.15s;}.nav-b:hover{color:var(--t2);background:var(--bg3);}.nav-b.on{color:var(--grn);border-bottom-color:var(--grn);background:var(--grnd);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pls 2s infinite;}@keyframes pls{0%,100%{opacity:1;}50%{opacity:.3;}}
.clk{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);}
/* TICKER BAR */
.tbar{background:var(--bg2);border-bottom:1px solid var(--bdr);height:32px;overflow:hidden;display:flex;align-items:center;}.tbar-inner{display:flex;gap:24px;white-space:nowrap;animation:scrl 60s linear infinite;padding-left:100%;}@keyframes scrl{to{transform:translateX(-50%);}}
.tbar-i{font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;gap:6px;align-items:center;flex-shrink:0;color:var(--t1);}
/* COUNTERS */
.cbar{background:linear-gradient(90deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--bdr);padding:6px 20px;display:flex;align-items:center;gap:20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}.cbar-i{display:flex;align-items:center;gap:5px;}.cbar-v{color:var(--cyn);font-weight:700;font-size:13px;}
/* SEARCH */
.sbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:8px 20px;display:flex;align-items:center;gap:10px;}.sinp{font-family:'JetBrains Mono',monospace;font-size:13px;padding:7px 12px;background:var(--bg0);border:1px solid var(--bdr);border-radius:var(--rad);color:var(--t1);outline:0;width:320px;transition:.2s;}.sinp:focus{border-color:var(--blu);}.sinp::placeholder{color:var(--t4);}
.qticks{display:flex;gap:4px;flex-wrap:wrap;}.qtk{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;background:var(--bg3);border:1px solid var(--bdr);border-radius:3px;color:var(--t2);cursor:pointer;transition:.15s;}.qtk:hover{border-color:var(--cyn);color:var(--cyn);background:var(--blud);}
/* LAYOUT */
.main{padding:16px 20px;max-width:1600px;margin:0 auto;}.page{display:none;}.page.on{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad2);overflow:hidden;}.card:hover{border-color:var(--bdr2);}.card-h{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}.card-t{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;}.card-b{padding:14px;}
/* HERO */
.hero{background:linear-gradient(135deg,var(--bg3),var(--bg2) 40%,#0c1628);border:1px solid var(--bdr2);border-radius:var(--rad2);padding:24px;margin-bottom:16px;position:relative;overflow:hidden;}.hero::before{content:'';position:absolute;top:-40%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(0,230,118,.06),transparent 70%);pointer-events:none;}.hero-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--grn);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}.hero-title{font-size:20px;font-weight:700;margin-bottom:6px;color:var(--t1);}.hero-sub{color:var(--t2);font-size:13px;line-height:1.6;}.hero-strat{margin-top:12px;padding:10px 14px;background:var(--grnd);border:1px solid rgba(0,230,118,.2);border-radius:var(--rad);font-size:13px;color:var(--grn);line-height:1.5;}
/* PILLS */
.pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;}.p-grn{background:var(--grnd);color:var(--grn);border:1px solid rgba(0,230,118,.3);}.p-red{background:var(--redd);color:var(--red);border:1px solid rgba(255,61,87,.3);}.p-ylw{background:var(--ylwd);color:var(--ylw);border:1px solid rgba(255,193,7,.3);}.p-blu{background:var(--blud);color:var(--blu);border:1px solid rgba(33,150,243,.3);}
/* RING */
.ring{position:relative;display:flex;align-items:center;justify-content:center;}.ring svg{transform:rotate(-90deg);}.ring .rv{position:absolute;font-family:'JetBrains Mono',monospace;font-weight:700;z-index:1;}.ring .rl{position:absolute;bottom:12px;font-size:8px;color:var(--t3);text-transform:uppercase;z-index:1;}
/* SCORE BAR */
.sb{margin-bottom:8px;}.sb-l{display:flex;justify-content:space-between;margin-bottom:3px;font-family:'JetBrains Mono',monospace;font-size:10px;}.sb-l .n{color:var(--t3);}.sb-l .v{font-weight:600;}.sb-bar{height:5px;background:var(--bg0);border-radius:3px;overflow:hidden;}.sb-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);}
/* TABLE */
.dtb{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t1);}.dtb th{text-align:left;padding:7px 8px;color:var(--t3);font-weight:500;text-transform:uppercase;font-size:9px;letter-spacing:.5px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg2);}.dtb td{padding:7px 8px;border-bottom:1px solid var(--bdr);color:var(--t1);}.dtb tr:hover td{background:var(--bg4);}
.clk-t{cursor:pointer;color:var(--cyn);font-weight:700;}.clk-t:hover{text-decoration:underline;}
/* PICK CARD */
.pkc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px;border-left:3px solid var(--grn);transition:.15s;margin-bottom:8px;}.pkc:hover{transform:translateX(2px);}.pkc.risk{border-left-color:var(--red);}.pkc.opp{border-left-color:var(--ylw);}.pkc-tick{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--cyn);cursor:pointer;}.pkc-tick:hover{text-decoration:underline;}.pkc-score{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--t1);}.pkc-reason{font-size:11px;color:var(--t2);margin-top:6px;line-height:1.4;}
/* MACRO */
.mac{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:8px 10px;text-align:center;}.mac-s{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;margin-bottom:2px;}.mac-p{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--t1);}.mac-c{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;margin-top:1px;}
/* SIGNAL */
.sigc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:12px 14px;border-left:3px solid var(--ylw);transition:.15s;margin-bottom:6px;}.sigc:hover{transform:translateX(2px);}.sigc.bull{border-left-color:var(--grn);}.sigc.bear{border-left-color:var(--red);}
/* WL */
.wl-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr);}.wl-item:last-child{border:0;}.wl-tick{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--cyn);cursor:pointer;}.wl-tick:hover{text-decoration:underline;}.wl-rm{background:0;border:0;color:var(--t4);cursor:pointer;font-size:14px;}.wl-rm:hover{color:var(--red);}
/* BUTTONS */
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:8px 18px;border:0;border-radius:var(--rad);cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:.2s;color:var(--t1);}.btn:disabled{opacity:.4;cursor:not-allowed;}.btn-grn{background:linear-gradient(135deg,var(--grn),var(--grn2));color:#000;}.btn-grn:hover:not(:disabled){box-shadow:0 4px 16px var(--grnd);transform:translateY(-1px);}.btn-orn{background:linear-gradient(135deg,var(--orn),#ff6d00);color:#000;}.btn-blu{background:linear-gradient(135deg,var(--blu),#1565c0);color:#fff;}.btn-sm{font-size:9px;padding:4px 10px;}
/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;backdrop-filter:blur(4px);}.ov.open{display:flex;justify-content:center;align-items:flex-start;padding-top:32px;}
.dp{background:var(--bg1);border:1px solid var(--bdr2);border-radius:var(--rad2);width:96%;max-width:1200px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}.dp-h{padding:18px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg1);z-index:1;}.dp-tick{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--cyn);}.dp-name{color:var(--t2);font-size:13px;margin-top:2px;}.dp-close{background:0;border:1px solid var(--bdr);color:var(--t3);width:30px;height:30px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}.dp-close:hover{border-color:var(--red);color:var(--red);}
.dp-body{padding:20px;}.dp-tabs{display:flex;gap:1px;margin-bottom:16px;border-bottom:1px solid var(--bdr);overflow-x:auto;}.dp-tab{font-family:'JetBrains Mono',monospace;font-size:10px;padding:7px 14px;background:0;border:0;color:var(--t4);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap;}.dp-tab:hover{color:var(--t1);}.dp-tab.on{color:var(--grn);border-bottom-color:var(--grn);}
.ds{display:none;}.ds.on{display:block;}
/* METRICS */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}.mi{background:var(--bg3);padding:10px;border-radius:var(--rad);border:1px solid var(--bdr);}.mi-l{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;margin-bottom:3px;}.mi-v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--t1);}
/* AI BOX */
.aib{background:linear-gradient(135deg,#140e30,var(--bg2));border:1px solid var(--prp);border-radius:var(--rad);padding:14px;margin-top:14px;}.aib-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--prp);text-transform:uppercase;margin-bottom:6px;}.aib-tx{font-size:13px;color:var(--t1);line-height:1.6;}
/* LOADING */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px;}.sp{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--grn);border-radius:50%;animation:spn .7s linear infinite;}@keyframes spn{to{transform:rotate(360deg);}}.ld-t{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);}
.emp{text-align:center;padding:40px 20px;}.emp h3{color:var(--t2);font-size:15px;margin-bottom:6px;}.emp p{color:var(--t3);font-size:12px;}
.chart-img{width:100%;border-radius:var(--rad);border:1px solid var(--bdr);}
.drv{display:inline-block;font-size:11px;padding:3px 8px;border-radius:3px;margin:2px 3px 2px 0;}.drv-p{background:var(--grnd);color:var(--grn);}.drv-n{background:var(--redd);color:var(--red);}
.ls-item{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 8px;background:var(--bg3);border:1px solid var(--bdr);border-radius:3px;color:var(--cyn);cursor:pointer;display:inline-block;margin:2px;}.ls-item:hover{background:var(--blud);}
/* EM ROW */
.em-row{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid var(--bdr);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t1);}.em-row:hover{background:var(--bg4);}.em-rank{width:24px;color:var(--t3);font-weight:700;}.em-flag{width:24px;font-size:14px;}.em-name{flex:1;color:var(--t2);}.em-price{width:80px;text-align:right;color:var(--t1);font-weight:600;}.em-chg{width:65px;text-align:right;font-weight:600;}.em-ytd{width:65px;text-align:right;font-weight:700;}
/* EXPLANATION BOX */
.expl{background:linear-gradient(135deg,#0d1628,var(--bg3));border:1px solid var(--bdr2);border-radius:var(--rad2);padding:20px;margin-bottom:16px;}.expl-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--cyn);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}.expl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.expl-item{padding:12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);}.expl-item h4{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--grn);margin-bottom:6px;}.expl-item p{font-size:12px;color:var(--t2);line-height:1.5;}.expl-item .num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--cyn);margin-bottom:4px;}
/* TAKAS BAR */
.tk-bar{display:flex;height:20px;border-radius:3px;overflow:hidden;margin:6px 0;}.tk-fill{transition:width .5s;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr;}.g4{grid-template-columns:1fr 1fr;}.hdr{flex-wrap:wrap;height:auto;padding:8px 12px;}.hdr-nav{overflow-x:auto;width:100%;}.sbar .qticks{display:none;}.sinp{width:100%;}.main{padding:10px;}.hero{padding:16px;}.dp{width:100%;border-radius:0;}.expl-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="hdr"><div class="logo">BIST<b>BULL</b><small>TERMINAL V6</small></div><div class="hdr-nav" id="nav"></div><div class="hdr-r"><div class="dot"></div><div class="clk" id="clk"></div></div></div>
<div class="tbar"><div class="tbar-inner" id="tbar"><div class="tbar-i"><span style="color:var(--t3)">Macro yukleniyor...</span></div></div></div>
<div class="cbar"><div class="cbar-i">Analiz <span class="cbar-v" id="cnt-a">0</span></div><div class="cbar-i">Sinyal <span class="cbar-v" id="cnt-s">0</span></div><div class="cbar-i">Cache <span class="cbar-v" id="cnt-c">0</span></div><div class="cbar-i" style="margin-left:auto">Son <span class="cbar-v" id="cnt-u">—</span></div></div>
<div class="sbar"><input type="text" class="sinp" id="sinp" placeholder="Ticker ara... (ASELS, THYAO)" autocomplete="off"><div class="qticks" id="qticks"></div></div>
<div class="main">
<div class="page on" id="pg-home" data-page="home"></div>
<div class="page" id="pg-radar" data-page="radar"></div>
<div class="page" id="pg-cross" data-page="cross"></div>
<div class="page" id="pg-makro" data-page="makro"></div>
<div class="page" id="pg-takas" data-page="takas"></div>
<div class="page" id="pg-sosyal" data-page="sosyal"></div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)closeD()"><div class="dp" id="dp"></div></div>
<script>
const S={page:'home',scan:null,cross:null,macro:null,dash:null,takas:null,social:null,wl:JSON.parse(localStorage.getItem('bb_wl')||'[]'),seen:JSON.parse(localStorage.getItem('bb_seen')||'[]')};
const QT=['ASELS','THYAO','BIMAS','KCHOL','TUPRS','AKBNK','GARAN','FROTO','TOASO','PGSUS'];
const PAGES=[{id:'home',label:'Home'},{id:'radar',label:'Radar'},{id:'cross',label:'Cross'},{id:'makro',label:'Makro'},{id:'takas',label:'Takas'},{id:'sosyal',label:'Sosyal'}];
const $=s=>document.getElementById(s);
const fN=(x,d=2)=>{if(x==null)return'N/A';if(Math.abs(x)>=1e9)return(x/1e9).toFixed(2)+'B';if(Math.abs(x)>=1e6)return(x/1e6).toFixed(2)+'M';if(Math.abs(x)>=1e3)return x.toLocaleString('en',{maximumFractionDigits:0});return x.toFixed(d);};
const fP=(x,d=1)=>x==null?'N/A':(x*100).toFixed(d)+'%';
const sC=v=>{if(v==null)return'var(--t3)';return v>=75?'var(--grn)':v>=55?'var(--ylw)':'var(--red)';};
const sPill=v=>{if(v==null)return'<span class="pill p-blu">—</span>';return v>=75?`<span class="pill p-grn">${v.toFixed(0)}</span>`:v>=55?`<span class="pill p-ylw">${v.toFixed(0)}</span>`:`<span class="pill p-red">${v.toFixed(0)}</span>`;};
const sPL=l=>l==='Pass'?'<span class="pill p-grn">Pass</span>':l==='Borderline'?'<span class="pill p-ylw">Border</span>':'<span class="pill p-red">Fail</span>';
const cC=v=>v>=0?'var(--grn)':'var(--red)';
const cS=v=>v>=0?'+'+v.toFixed(2):v.toFixed(2);
async function api(p){const r=await fetch(p);if(!r.ok)throw new Error(r.status);return r.json();}
setInterval(()=>{$('clk').textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' IST';},1000);

// NAV
const nav=$('nav');PAGES.forEach(p=>{const b=document.createElement('button');b.className='nav-b'+(p.id==='home'?' on':'');b.textContent=p.label;b.dataset.p=p.id;b.onclick=()=>goPage(p.id);nav.appendChild(b);});
function goPage(id){S.page=id;nav.querySelectorAll('.nav-b').forEach(b=>b.classList.toggle('on',b.dataset.p===id));document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.dataset.page===id));if(id==='home')renderHome();if(id==='radar')renderRadarPage();if(id==='cross')renderCrossPage();if(id==='makro')renderMakroPage();if(id==='takas')renderTakasPage();if(id==='sosyal')renderSosyalPage();}

// QUICK TICKERS + SEARCH
const qtEl=$('qticks');QT.forEach(t=>{const d=document.createElement('div');d.className='qtk';d.textContent=t;d.onclick=()=>loadTicker(t);qtEl.appendChild(d);});
$('sinp').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim().toUpperCase();if(v.length>=3)loadTicker(v);}});

// WATCHLIST
function wlAdd(t){t=t.toUpperCase();if(!S.wl.includes(t)){S.wl.push(t);localStorage.setItem('bb_wl',JSON.stringify(S.wl));}}
function wlRm(t){S.wl=S.wl.filter(x=>x!==t);localStorage.setItem('bb_wl',JSON.stringify(S.wl));}
function seenAdd(t){t=t.toUpperCase();S.seen=S.seen.filter(x=>x!==t);S.seen.unshift(t);S.seen=S.seen.slice(0,10);localStorage.setItem('bb_seen',JSON.stringify(S.seen));}

// RENDER HELPERS

function scoreBars(sc){return[{k:'value',l:'Value',w:20},{k:'quality',l:'Quality',w:22},{k:'growth',l:'Growth',w:15},{k:'balance',l:'Balance',w:20},{k:'earnings',l:'Earn',w:10},{k:'moat',l:'Moat',w:8},{k:'capital',l:'Capital',w:5}].map(d=>{const v=sc[d.k],c=sC(v);return`<div class="sb"><div class="sb-l"><span class="n">${d.l} (${d.w}%)</span><span class="v" style="color:${c}">${v!=null?v.toFixed(0):'?'}</span></div><div class="sb-bar"><div class="sb-fill" style="width:${v||0}%;background:${c};"></div></div></div>`;}).join('');}

function renderTakasPage(){const pg=$('pg-takas');if(!S.takas){pg.innerHTML='<div class="ld"><div class="sp"></div><div class="ld-t">Takas verileri yukleniyor...</div></div>';loadTakas();return;}const items=S.takas.items||[];let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h2 style="font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--prp)">📊 Takas Analizi — Yabancı Oranları</h2><p style="font-size:11px;color:var(--t3);margin-top:2px">Kaynak: ${S.takas.source||'—'} | ${items.length} hisse</p></div><button class="btn btn-sm btn-blu" onclick="S.takas=null;renderTakasPage()">🔄</button></div>`;
if(S.takas.error){h+=`<div class="aib" style="border-color:var(--ylw);margin-bottom:14px"><div class="aib-t" style="color:var(--ylw)">Uyari</div><div class="aib-tx" style="color:var(--ylw)">${S.takas.error}</div></div>`;}
if(items.length){h+=`<div class="card"><div class="card-b" style="overflow-x:auto"><table class="dtb"><thead><tr><th>#</th><th>Ticker</th><th>Yabanci %</th><th>Fiyat</th><th>Bar</th></tr></thead><tbody>`;items.slice(0,40).forEach((it,i)=>{const pct=it.foreign_pct||0;const barW=Math.min(pct,100);const barCol=pct>50?'var(--grn)':pct>20?'var(--ylw)':'var(--red)';h+=`<tr><td style="color:var(--t3)">${i+1}</td><td class="clk-t" onclick="loadTicker('${it.ticker}')">${it.ticker}</td><td style="color:var(--t1);font-weight:700">${pct.toFixed(1)}%</td><td style="color:var(--t1)">${it.price?fN(it.price):'—'}</td><td style="width:120px"><div class="tk-bar"><div class="tk-fill" style="width:${barW}%;background:${barCol};color:#000">${pct>10?pct.toFixed(0)+'%':''}</div></div></td></tr>`;});h+='</tbody></table></div></div>';}else{h+='<div class="emp"><h3 style="color:var(--t2)">Takas verisi alinamadi</h3><p style="color:var(--t3)">Railway network ayarlarindan isyatirim.com.tr domain\'ini ekleyin</p></div>';}pg.innerHTML=h;}
async function loadTakas(){try{S.takas=await api('/api/takas');renderTakasPage();}catch(e){S.takas={items:[],error:e.message};renderTakasPage();}}

// SOSYAL PAGE
function renderSosyalPage(){const pg=$('pg-sosyal');if(!S.social){pg.innerHTML='<div class="ld"><div class="sp"></div><div class="ld-t">X/Twitter sentiment yukleniyor...</div></div>';loadSocial();return;}
let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h2 style="font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--prp)">𝕏 Sosyal Medya Sentiment</h2><p style="font-size:11px;color:var(--t3);margin-top:2px">Kaynak: ${S.social.source==='grok_ai'?'Grok AI (X/Twitter verisi)':'—'}</p></div><button class="btn btn-sm btn-blu" onclick="S.social=null;renderSosyalPage()">🔄</button></div>`;
if(S.social.error){h+=`<div class="aib" style="border-color:var(--ylw);margin-bottom:14px"><div class="aib-t" style="color:var(--ylw)">Uyari</div><div class="aib-tx" style="color:var(--ylw)">${S.social.error}</div></div>`;}
// Summary
if(S.social.summary){h+=`<div class="aib" style="margin-bottom:14px"><div class="aib-t">📊 Genel Sentiment: <span style="color:${S.social.overall_sentiment?.includes('bull')?'var(--grn)':S.social.overall_sentiment?.includes('bear')?'var(--red)':'var(--ylw)'};text-transform:uppercase">${S.social.overall_sentiment||'—'}</span></div><div class="aib-tx">${S.social.summary}</div></div>`;}
// Hot Topics
if(S.social.hot_topics&&S.social.hot_topics.length){h+=`<div style="margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap">`;S.social.hot_topics.forEach(t=>{h+=`<span class="pill p-blu">#${t}</span>`;});h+=`</div>`;}
// Trending Stocks
const trends=S.social.trending||[];
if(trends.length){h+=`<div class="card"><div class="card-h"><span class="card-t">🔥 X'te En Cok Konusulan Hisseler</span></div><div class="card-b"><table class="dtb"><thead><tr><th>#</th><th>Ticker</th><th>Sentiment</th><th>Skor</th><th>Neden</th></tr></thead><tbody>`;
trends.forEach((t,i)=>{const sentCol=t.sentiment==='bullish'?'var(--grn)':t.sentiment==='bearish'?'var(--red)':'var(--ylw)';h+=`<tr><td style="color:var(--t3)">${i+1}</td><td class="clk-t" onclick="loadTicker('${t.ticker}')">${t.ticker}</td><td style="color:${sentCol};font-weight:700;text-transform:uppercase">${t.sentiment||'—'}</td><td>${sPill(t.score)}</td><td style="color:var(--t2);font-size:10px">${t.reason||''}</td></tr>`;});
h+=`</tbody></table></div></div>`;}
pg.innerHTML=h;}
async function loadSocial(){try{S.social=await api('/api/social');renderSosyalPage();}catch(e){S.social={trending:[],summary:'Hata: '+e.message,error:e.message};renderSosyalPage();}}

// SCAN
async function startScan(){const btn=$('scanBtn');if(btn){btn.disabled=true;btn.textContent='⏳ TARANIYOR...';}try{S.scan=await api('/api/scan');S.dash=await api('/api/dashboard');updCnt(S.dash);renderHome();}catch(e){const t=$('hT');if(t){t.textContent='Scan Basarisiz';t.style.color='var(--red)';}}if(btn){btn.disabled=false;btn.textContent='🔄 YENİLE';}}
function updCnt(d){if(!d)return;const c=d.counters||{};$('cnt-a').textContent=c.total_analyzed||0;$('cnt-s').textContent=c.cross_signals||0;$('cnt-c').textContent=c.cache_raw||0;if(d.asof)$('cnt-u').textContent=new Date(d.asof).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}

// BRIEFING
async function loadBriefing(){const box=$('hSt');if(!box)return;box.innerHTML='<div class="hero-strat" style="border-color:var(--prp);background:var(--prpd);color:var(--prp)">🤖 AI brifing yukleniyor...</div>';try{const d=await api('/api/briefing');box.innerHTML=d.briefing?`<div class="hero-strat">${d.briefing.replace(/\n/g,'<br>')}</div>`:`<div class="hero-strat" style="border-color:var(--ylw);background:var(--ylwd);color:var(--ylw)">${d.error||'AI brifing alinamadi — OPENAI_KEY ekleyin'}</div>`;}catch(e){box.innerHTML=`<div class="hero-strat" style="border-color:var(--red);background:var(--redd);color:var(--red)">Hata: ${e.message}</div>`;}}

// TICKER DETAIL
async function loadTicker(t){t=t.replace('.IS','').toUpperCase();seenAdd(t);openD();$('dp').innerHTML=`<div class="ld"><div class="sp"></div><div class="ld-t" style="color:var(--t3)">${t} yukleniyor...</div></div>`;try{const[r,tech]=await Promise.all([api(`/api/analyze/${t}`),api(`/api/technical/${t}`).catch(()=>null)]);renderDetail(t,r,tech);}catch(e){$('dp').innerHTML=`<div class="emp"><h3 style="color:var(--t2)">Veri alinamadi: ${t}</h3><p style="color:var(--t3)">${e.message}</p></div>`;}}
function renderDetail(t,r,tech){const s=r.scores,m=r.metrics,L=r.legendary||{},inWL=S.wl.includes(t);$('dp').innerHTML=`<div class="dp-h"><div><div class="dp-tick">${r.ticker} <span style="color:${sC(r.overall)};font-size:18px">${r.overall}/100</span></div><div class="dp-name">${r.name} · ${r.sector||''} · ${r.style}</div><div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${sPL(L.buffett_filter||'Fail')} ${sPL(L.graham_filter||'Fail')} <span class="pill p-blu">Conf:${r.confidence}</span><button class="btn btn-sm ${inWL?'btn-orn':'btn-blu'}" onclick="toggleWL('${t}')">${inWL?'⭐ Cikar':'☆ Ekle'}</button></div></div><button class="dp-close" onclick="closeD()">✕</button></div><div class="dp-body"><div class="dp-tabs"><button class="dp-tab on" onclick="dtab(this,'ov')">Overview</button><button class="dp-tab" onclick="dtab(this,'sc')">Scores</button><button class="dp-tab" onclick="dtab(this,'val')">Value</button><button class="dp-tab" onclick="dtab(this,'qua')">Quality</button><button class="dp-tab" onclick="dtab(this,'tek')">Teknik</button><button class="dp-tab" onclick="dtab(this,'leg')">Legend</button><button class="dp-tab" onclick="dtab(this,'cht')">Chart</button></div><div class="ds on" id="ds-ov"><div class="g2" style="margin-bottom:14px"><div><div style="text-align:center;margin-bottom:12px">${ring(r.overall,'OVERALL',110)}</div><div class="mg" style="grid-template-columns:repeat(2,1fr)">${mBox('Fiyat',m.price?fN(m.price)+' '+r.currency:'N/A')}${mBox('Piyasa',fN(m.market_cap))}${mBox('P/E',fN(m.pe))}${mBox('P/B',fN(m.pb))}${mBox('ROE',fP(m.roe))}${mBox('FCF Yield',fP(m.fcf_yield))}</div></div><div>${scoreBars(s)}<div style="margin-top:10px">${(r.positives||[]).map(p=>`<span class="drv drv-p">✓ ${p}</span>`).join('')}${(r.negatives||[]).map(n=>`<span class="drv drv-n">✗ ${n}</span>`).join('')}</div></div></div><div class="aib"><div class="aib-t">🤖 AI TRADER OZET</div><div class="aib-tx" id="ai-${t}">Yukleniyor...</div></div></div><div class="ds" id="ds-sc"><div class="g4" style="margin-bottom:14px">${Object.entries(s).map(([k,v])=>`<div style="text-align:center">${ring(v,k.toUpperCase(),76)}</div>`).join('')}</div></div><div class="ds" id="ds-val"><div class="mg">${mBox('P/E',fN(m.pe))}${mBox('P/B',fN(m.pb))}${mBox('EV/EBITDA',fN(m.ev_ebitda))}${mBox('PEG',L.peg||'N/A')}${mBox('FCF Yield',fP(m.fcf_yield))}${mBox('Graham FV',fN(m.graham_fv))}${mBox('MoS',L.graham_mos||'N/A')}${mBox('Div Yield',fP(m.dividend_yield))}${mBox('Market Cap',fN(m.market_cap))}${mBox('Beta',fN(m.beta))}</div></div><div class="ds" id="ds-qua"><div class="mg">${mBox('ROE',fP(m.roe))}${mBox('ROA',fP(m.roa))}${mBox('ROIC',fP(m.roic))}${mBox('Gross',fP(m.gross_margin))}${mBox('Op',fP(m.operating_margin))}${mBox('Net',fP(m.net_margin))}${mBox('Rev Grw',fP(m.revenue_growth))}${mBox('EPS Grw',fP(m.eps_growth))}${mBox('Gelir',fN(m.revenue))}${mBox('Net Gelir',fN(m.net_income))}${mBox('EBITDA',fN(m.ebitda))}${mBox('Op CF',fN(m.operating_cf))}${mBox('FCF',fN(m.free_cf))}</div><h4 style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin:14px 0 8px">BILANCO</h4><div class="mg">${mBox('Varlik',fN(m.total_assets))}${mBox('Borc',fN(m.total_debt))}${mBox('Nakit',fN(m.cash))}${mBox('Ozsermaye',fN(m.equity))}${mBox('NB/EBITDA',fN(m.net_debt_ebitda))}${mBox('D/E',fN(m.debt_equity))}${mBox('Cari',fN(m.current_ratio))}${mBox('Faiz',fN(m.interest_coverage))}</div></div><div class="ds" id="ds-tek">${tech?renderTech(tech):'<div class="emp"><h3 style="color:var(--t2)">Teknik veri yok</h3></div>'}</div><div class="ds" id="ds-leg"><div class="mg" style="grid-template-columns:repeat(3,1fr)">${mBox('Piotroski F',L.piotroski||'N/A')}${mBox('Altman Z',L.altman||'N/A')}${mBox('Beneish M',L.beneish||'N/A')}${mBox('PEG',L.peg||'N/A')}${mBox('Graham MoS',L.graham_mos||'N/A')}${mBox('Buffett',L.buffett_filter||'N/A')}${mBox('Graham',L.graham_filter||'N/A')}</div><div style="margin-top:14px;padding:12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);font-size:12px;color:var(--t2);line-height:1.6"><b style="color:var(--t1)">Neden One Cikiyor?</b><br>${(r.positives||[]).map(p=>`<span style="color:var(--grn)">✓</span> ${p}`).join('<br>')}<br><b style="color:var(--t1)">Dikkat:</b><br>${(r.negatives||[]).map(n=>`<span style="color:var(--red)">✗</span> ${n}`).join('<br>')}</div></div><div class="ds" id="ds-cht"><img class="chart-img" src="/api/chart/${t}" alt="${t}" onerror="this.parentElement.innerHTML='<div class=\\'emp\\'><h3>Chart yuklenemedi</h3></div>'"></div></div>`;api(`/api/ai-summary/${t}`).then(d=>{const el=$('ai-'+t);if(el)el.textContent=d.summary||'AI ozet alinamadi — OPENAI_KEY ekleyin';}).catch(()=>{});}
function renderTech(t){const comps=(t.components||[]).map(c=>{const col=c.score>=65?'var(--grn)':c.score>=40?'var(--ylw)':'var(--red)';return`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr)"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2)">${c.name}</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${col}">${c.desc} (${c.score})</span></div>`;}).join('');return`<div class="g2"><div><div style="text-align:center;margin-bottom:14px">${ring(t.tech_score,'TEKNIK',100)}</div><div class="mg" style="grid-template-columns:repeat(2,1fr)">${mBox('RSI',t.rsi?t.rsi.toFixed(1):'N/A')}${mBox('MACD',t.macd?t.macd.toFixed(4):'N/A')}${mBox('MA50',t.ma50?t.ma50.toFixed(2):'N/A')}${mBox('MA200',t.ma200?t.ma200.toFixed(2):'N/A')}${mBox('BB',t.bb_pos||'N/A')}${mBox('Hacim',t.vol_ratio?t.vol_ratio.toFixed(1)+'x':'N/A')}${mBox('52W H',t.high_52w?t.high_52w.toFixed(2):'N/A')}${mBox('52W L',t.low_52w?t.low_52w.toFixed(2):'N/A')}</div></div><div><div class="card"><div class="card-h"><span class="card-t">Components</span></div><div class="card-b">${comps}</div></div></div></div>`;}
function toggleWL(t){if(S.wl.includes(t))wlRm(t);else wlAdd(t);loadTicker(t);}
function dtab(btn,id){btn.closest('.dp-tabs').querySelectorAll('.dp-tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');btn.closest('.dp-body').querySelectorAll('.ds').forEach(s=>s.classList.remove('on'));$('ds-'+id).classList.add('on');}
function openD(){$('ov').classList.add('open');document.body.style.overflow='hidden';}
function closeD(){$('ov').classList.remove('open');document.body.style.overflow='';if(S.page==='home')renderHome();}

// INIT — auto-scan, no empty page
(async()=>{
renderHome();
try{await api('/api/health');}catch(e){console.error(e);}
await loadMacro();
// Load daily quote
try{const q=await api('/api/quote');const qt=$('quoteText');const qa=$('quoteAuthor');if(qt&&q.text){qt.textContent='"'+q.text+'"';qa.textContent=q.author;}}catch(e){}
try{const d=await api('/api/top10');if(d.items&&d.items.length>0){S.scan=d;S.dash=await api('/api/dashboard');updCnt(S.dash);renderHome();}else{startScan();}}catch(e){startScan();}
try{S.cross=await api('/api/cross');}catch(e){}
renderHome();
// Reload quote after renderHome
try{const q=await api('/api/quote');const qt=$('quoteText');const qa=$('quoteAuthor');if(qt&&q.text){qt.textContent='"'+q.text+'"';qa.textContent=q.author;}}catch(e){}
})();

// BORSADEDE AGENT
function toggleAgent(){const el=$('agentPanel');el.style.display=el.style.display==='none'?'flex':'none';}
async function sendAgent(){
  const inp=$('agentInput');const box=$('agentMsgs');const q=inp.value.trim();if(!q)return;
  box.innerHTML+=`<div style="text-align:right;margin-bottom:8px"><span style="background:var(--blud);border:1px solid rgba(33,150,243,.3);padding:6px 10px;border-radius:8px 8px 0 8px;font-size:12px;color:var(--t1);display:inline-block;max-width:80%">${q}</span></div>`;
  box.innerHTML+=`<div style="margin-bottom:8px" id="agentLoading"><span style="color:var(--t3);font-size:11px">🐂 Düşünüyorum...</span></div>`;
  box.scrollTop=box.scrollHeight;inp.value='';
  try{const d=await api('/api/agent?q='+encodeURIComponent(q));const ld=$('agentLoading');if(ld)ld.remove();box.innerHTML+=`<div style="margin-bottom:8px"><span style="background:var(--bg3);border:1px solid var(--bdr);padding:6px 10px;border-radius:8px 8px 8px 0;font-size:12px;color:var(--t1);display:inline-block;max-width:85%;line-height:1.5">${d.answer}</span></div>`;box.scrollTop=box.scrollHeight;}
  catch(e){const ld=$('agentLoading');if(ld)ld.remove();box.innerHTML+=`<div style="margin-bottom:8px"><span style="color:var(--red);font-size:11px">Hata: ${e.message}</span></div>`;}
}
</script>

<!-- BORSADEDE FLOATING AGENT -->
<div id="agentBtn" onclick="toggleAgent()" style="position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--grn),var(--grn2));cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(0,230,118,.4);z-index:150;transition:.2s;" onmouseenter="this.style.transform='scale(1.1)'" onmouseleave="this.style.transform='scale(1)'">🐂</div>

<div id="agentPanel" style="display:none;position:fixed;bottom:86px;right:20px;width:360px;max-width:calc(100vw - 40px);height:460px;background:var(--bg1);border:1px solid var(--bdr2);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:150;flex-direction:column;overflow:hidden;">
  <div style="padding:12px 16px;background:linear-gradient(135deg,var(--grn),var(--grn2));display:flex;align-items:center;gap:10px;">
    <span style="font-size:24px">🐂</span>
    <div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#000;">BORSADEDE</div><div style="font-size:10px;color:rgba(0,0,0,.6)">BistBull AI Yatırım Asistanı</div></div>
    <button onclick="toggleAgent()" style="margin-left:auto;background:0;border:0;color:rgba(0,0,0,.5);font-size:18px;cursor:pointer">✕</button>
  </div>
  <div id="agentMsgs" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;">
    <div style="margin-bottom:8px"><span style="background:var(--bg3);border:1px solid var(--bdr);padding:6px 10px;border-radius:8px 8px 8px 0;font-size:12px;color:var(--t1);display:inline-block;max-width:85%;line-height:1.5">Merhaba! Ben BORSADEDE 🐂 BIST hakkında her şeyi sorabilirsin. Hisse analizi, piyasa durumu, temel kavramlar — yardımcı olurum!</span></div>
  </div>
  <div style="padding:10px 12px;border-top:1px solid var(--bdr);display:flex;gap:8px;">
    <input id="agentInput" type="text" placeholder="Sorunuzu yazın..." style="flex:1;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;background:var(--bg0);border:1px solid var(--bdr);border-radius:6px;color:var(--t1);outline:0;" onkeydown="if(event.key==='Enter')sendAgent()">
    <button onclick="sendAgent()" style="font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 14px;background:var(--grn);color:#000;border:0;border-radius:6px;cursor:pointer;font-weight:600;">Sor</button>
  </div>
</div>
